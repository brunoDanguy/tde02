<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <header>
        <h1>Sistema Seguro - TDE 02</h1>
        <p>Criptografia Hibrida RSA + AES | PUCPR</p>
    </header>

    <div class="container">
        <h2>Login</h2>
        <p class="subtitulo">As credenciais sao criptografadas antes de serem enviadas.</p>

        <div id="alerta" class="alerta"></div>

        <form id="form-login">
            <label for="email">E-mail</label>
            <input type="email" id="email" placeholder="seu@email.com" required>

            <label for="senha">Senha</label>
            <input type="password" id="senha" placeholder="Sua senha" required>

            <button type="submit" id="btn-submit">Entrar</button>
        </form>

        <p class="info-cripto">Protegido com AES-256 + RSA-2048</p>
        <div class="link-outro">Nao tem conta? <a href="cadastro.html">Cadastre-se</a></div>
    </div>

    <script src="js/cripto.js"></script>
    <script src="js/login.js"></script>

</body>
</html>
