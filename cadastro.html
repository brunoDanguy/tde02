<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <header>
        <h1>Sistema Seguro - TDE 02</h1>
        <p>Criptografia Hibrida RSA + AES | PUCPR</p>
    </header>

    <div class="container">
        <h2>Cadastro</h2>
        <p class="subtitulo">Os dados sao criptografados antes de serem enviados.</p>

        <div id="alerta" class="alerta"></div>

        <form id="form-cadastro">
            <label for="nome">Nome completo</label>
            <input type="text" id="nome" placeholder="Seu nome" required>

            <label for="email">E-mail</label>
            <input type="email" id="email" placeholder="seu@email.com" required>

            <label for="senha">Senha</label>
            <input type="password" id="senha" placeholder="Minimo 6 caracteres" required>

            <label for="confirmar-senha">Confirmar senha</label>
            <input type="password" id="confirmar-senha" placeholder="Repita a senha" required>

            <button type="submit" id="btn-submit">Cadastrar</button>
        </form>

        <p class="info-cripto">Protegido com AES-256 + RSA-2048</p>
        <div class="link-outro">Ja tem conta? <a href="login.html">Fazer login</a></div>
    </div>

    <script src="js/cripto.js"></script>
    <script src="js/cadastro.js"></script>

</body>
</html>
